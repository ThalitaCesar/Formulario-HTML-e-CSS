<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Midias/imagens/Goescat-Macaron-Vmware-workstation.ico" type="image/x-icon"/>

</head>
<body>
    <div align="center" class="imagens_home">
    <img src="Midias/imagens/cadastro-removebg-previewedit600.png"/> </div>

<form id="formulario" autocomplete="off" name="formulario" accept-charset="novalidade">
    <fieldset class="grupo">
    <legend>Informações de Login</legend>
    <div class="campo"> 
        <label>Email  <input type="email" name="temail" id="cemail " style="width: 300px"/> </br> </label>
    </div>
    <div class="campo"> 
        <label>Criar Senha <input type="password" name="tsenha" id="csenha" />  </br> </label>
    </div>
    <div class="campo"> 
                <label>Confirmar senha   <input type="password" name="tsenhaconfirm" id="csenhaconfirm" />  </br> </label>
            </div>
        </fieldset>

<fieldset class="grupo">
    <legend>Dados Cadastrais</legend>
    <div class="campo"> 
        <label>Nome <input type="text" name="tnome" id="cnome" /> </br>
        </div>
    <div class="campo"> 
        <label>Sobrenome <input type="text" name="tsobrenome" id="csobrenome" /> </br> </label>
    </div>
    <div class="campo"><label>Data de Nascimento <input type="date" name="tdata" id="cdata" />  </br> </label>
    </div>
    <div class="campo">

    <label>CPF <input type="number" name="tcpf" id="ccpf" maxlength="11" placeholder="000.000.000-00"/>  </br> </label>
</div>
<div class="campo"> 
        Sexo: 
        <input type="radio" name="tsexo" id="CFem" /> <llabel for "cfem"> Feminino</label>
        <input type="radio" name="tsexo" id="Cmasc" /> <llabel for "cmasc"> Masculino</label>
</br> </div>

<div class="campo"> 
    <label>Telefone <input type="number" name="ttelefone" id="ctelefone" placeholder="+55 00 90000-0000" />  </br> </label> </div>

</fieldset>
<fieldset class="grupo">
    <legend>Endereço de Entrega</legend>
   
    <div class="campo"> 
        <label> CEP: <input type="text" id="cep" maxlength="9" placeholder="00000-000" autofocus> </br> </label>
    </div> 
    <div class="campo"> 
        <label> Rua: <input type="text" id="Rua" style="width: 300px"> </label>
    </div>
    <div class="campo"> 
            <label> Número: <input type="number" id="numero" style="width: 70px"> </br> </label>
        </div>
        <div class="campo">     
            <label> Bairro: <input type="text" id="bairro" style="width: 300px"> </br> </label>
        </div>
        <div class="campo"> 
                <label>Cidade: <input type="text" id="cidade"> </label>
            </div>
             <div class="campo"> 
                    <label for="uf">Estado </label>
		<select id="uf">
        <optgroup label="Região Sudeste">
            <option value="SP">SP </option>
            <option value="RJ">RJ </option>
            <option value="Es">ES </option>
            <option value="MG">MG </option>
        </optgroup>
        <optgroup label="Região Nordeste">
            <option value="AL">AL </option>
            <option value="BA">BA </option>
            <option value="CE">CE </option>
            <option value="MA">MA </option>
            <option value="PB">PB </option>
            <option value="PE">PE </option>
            <option value="PI">PI </option>
            <option value="RN">RN </option>
            <option value="SE">SE </option>
        </optgroup>
        <optgroup label="Região Norte">
            <option value="AC">AC </option>
            <option value="AP">AP </option>
            <option value="AM">AM </option>
            <option value="PA">PA </option>
            <option value="RO">RO </option>
            <option value="RR">RR </option>
            <option value="TO">TO </option>
        </optgroup>
        <optgroup label="Região Sul">
            <option value="PR">PR </option>
            <option value="RS">RS </option>
            <option value="SC">SC</option>
        </optgroup>
        <optgroup label="Região Centro Oeste">
            <option value="DF">DF </option>
            <option value="GO">GO </option>
            <option value="MT">MT</option>
            <option value="MS">MS </option>
        </optgroup>
    </select> </br> </div>

   <div class="campo"> 
        <label>Ponto de referência <input type="text" name="tpreferencia" id="creferencia" style="width: 300px" /> </br> </label>
   </div>
</fieldset>
<fieldset class="grupo">
<legend>Informações Adicionais de Entrega</legend>
<div class="campo"> <label for="msg" name="tMsg" id="cMsg"></label>  </div>
    <div class="campo"> <textarea name="tmsg" id="cMsg" cols="45" rows="5" > "Deixe aqui sua mensagem"</textarea>
    </div>
</fieldset>

<fieldset class="grupo">

<label><input id="notificacoes" type="checkbox" value="notificações" name="linguagens" checked>
Receber notificações por whatsapp </input> </br> </label>
<label><input id="ofertas" type="checkbox" value="ofertas" name="linguagens" checked> 
Desejo receber ofertas por e-mail </input> </label>
</fieldset>
<p>
    <label> <div class="container-login100-form-btn">
    <button class="select" onclick="validar()">
        Enviar
    </button> </label>
</div></p>
</form>
</body>
</html>
